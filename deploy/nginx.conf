# deploy/nginx.conf
# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ai_api:10m rate=100r/s;
limit_req_zone $http_x_forwarded_for zone=fastify:10m rate=5000r/s;

upstream health_ai {
    least_conn;
    server ai_api:8001 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Health check — no rate limit
    location /health {
        proxy_pass http://health_ai;
        access_log off;
    }

    # Metrics — internal only
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://health_ai;
    }

    # AI API — rate limited
    location /api/ {
        limit_req zone=fastify burst=1000 nodelay;
        limit_req_status 429;

        proxy_pass http://health_ai;
        proxy_http_version 1.1;
        proxy_set_header Connection "";      # Enable keepalive to upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Fast timeouts — requests should queue in Celery, not nginx
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        proxy_send_timeout    15s;

        # Buffer settings for audio uploads
        client_max_body_size    50M;
        client_body_buffer_size 1M;
    }
}
